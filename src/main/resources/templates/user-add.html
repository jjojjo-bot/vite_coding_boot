<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사용자 추가</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }

        .header {
            background: #fff;
            padding: 16px 32px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 20px;
            color: #1a1a1a;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-right span {
            color: #555;
            font-size: 14px;
        }

        .header-right a {
            color: #e74c3c;
            text-decoration: none;
            font-size: 14px;
        }

        .header-right a:hover {
            text-decoration: underline;
        }

        .layout {
            display: flex;
            min-height: calc(100vh - 57px);
        }

        .sidebar {
            width: 220px;
            background: #fff;
            border-right: 1px solid #e0e0e0;
            padding: 24px 0;
            flex-shrink: 0;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li a {
            display: block;
            padding: 12px 24px;
            color: #555;
            text-decoration: none;
            font-size: 14px;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }

        .sidebar-menu li a:hover {
            background: #f0f2f5;
            color: #1a1a1a;
        }

        .sidebar-menu li a.active {
            background: #e8f0fe;
            color: #4a90d9;
            border-left-color: #4a90d9;
            font-weight: 600;
        }

        .main-content {
            flex: 1;
            padding: 32px;
            max-width: calc(1100px + 64px);
        }

        .section-header {
            margin-bottom: 24px;
        }

        .section-header h2 {
            font-size: 18px;
            color: #1a1a1a;
        }

        .form-card {
            background: #fff;
            border-radius: 8px;
            padding: 32px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
            max-width: 500px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4a90d9;
            box-shadow: 0 0 0 2px rgba(74, 144, 217, 0.2);
        }

        .btn {
            display: inline-block;
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
        }

        .btn-primary {
            background: #4a90d9;
        }

        .btn-primary:hover {
            background: #357abd;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: #d5f5e3;
            color: #27ae60;
            border: 1px solid #a9dfbf;
        }

        .alert-error {
            background: #fde8e8;
            color: #e74c3c;
            border: 1px solid #f5b7b1;
        }
    </style>
</head>
<body>
<div class="header">
    <h1>조별과제 관리</h1>
    <div class="header-right">
        <span th:text="${user.name} + ' (' + ${user.role.name()} + ')'"></span>
        <a th:href="@{/logout}">로그아웃</a>
    </div>
</div>

<div class="layout">
    <nav class="sidebar">
        <ul class="sidebar-menu">
            <li><a th:href="@{/dashboard}" th:classappend="${currentPage == 'dashboard'} ? 'active'">대시보드</a></li>
            <li th:if="${user.leader}"><a th:href="@{/users/new}" th:classappend="${currentPage == 'user-add'} ? 'active'">사용자추가</a></li>
            <li><a th:href="@{/approval-history}" th:classappend="${currentPage == 'approval-history'} ? 'active'">결재함</a></li>
        </ul>
    </nav>

    <div class="main-content">
        <div class="section-header">
            <h2>사용자 추가</h2>
        </div>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

        <div class="form-card">
            <form th:action="@{/users}" method="post">
                <div class="form-group">
                    <label for="username">아이디</label>
                    <input type="text" id="username" name="username" required placeholder="아이디를 입력하세요">
                </div>
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" required placeholder="비밀번호를 입력하세요">
                </div>
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" required placeholder="이름을 입력하세요">
                </div>
                <div class="form-group">
                    <label for="role">역할</label>
                    <select id="role" name="role" required>
                        <option value="MEMBER">MEMBER</option>
                        <option value="LEADER">LEADER</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">사용자 추가</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
