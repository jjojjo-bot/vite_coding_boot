<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결재함</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }

        .header {
            background: #fff;
            padding: 16px 32px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 20px;
            color: #1a1a1a;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-right span {
            color: #555;
            font-size: 14px;
        }

        .header-right a {
            color: #e74c3c;
            text-decoration: none;
            font-size: 14px;
        }

        .header-right a:hover {
            text-decoration: underline;
        }

        .layout {
            display: flex;
            min-height: calc(100vh - 57px);
        }

        .sidebar {
            width: 220px;
            background: #fff;
            border-right: 1px solid #e0e0e0;
            padding: 24px 0;
            flex-shrink: 0;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li a {
            display: block;
            padding: 12px 24px;
            color: #555;
            text-decoration: none;
            font-size: 14px;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }

        .sidebar-menu li a:hover {
            background: #f0f2f5;
            color: #1a1a1a;
        }

        .sidebar-menu li a.active {
            background: #e8f0fe;
            color: #4a90d9;
            border-left-color: #4a90d9;
            font-weight: 600;
        }

        .main-content {
            flex: 1;
            padding: 32px;
            max-width: calc(1100px + 64px);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-header h2 {
            font-size: 18px;
            color: #1a1a1a;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        }

        th, td {
            padding: 12px 16px;
            text-align: left;
        }

        th {
            background: #f8f9fa;
            color: #555;
            font-size: 13px;
            font-weight: 600;
            border-bottom: 2px solid #e9ecef;
        }

        td {
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
            color: #333;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .approval-PENDING {
            background: #fff3cd;
            color: #856404;
        }

        .approval-APPROVED {
            background: #d5f5e3;
            color: #27ae60;
        }

        .approval-REJECTED {
            background: #fde8e8;
            color: #e74c3c;
        }

        .rejection-reason {
            font-size: 12px;
            color: #e74c3c;
            margin-top: 4px;
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 15px;
        }

        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .filter-tabs a {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            text-decoration: none;
            color: #555;
            background: #e9ecef;
            transition: all 0.2s;
        }

        .filter-tabs a:hover {
            background: #dee2e6;
        }

        .filter-tabs a.active {
            color: #fff;
            background: #4a90d9;
            font-weight: 600;
        }

        .btn {
            display: inline-block;
            padding: 4px 10px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
        }

        .btn-success { background: #27ae60; }
        .btn-success:hover { background: #219a52; }
        .btn-warning { background: #f39c12; }
        .btn-warning:hover { background: #d68910; }

        .approve-form {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .approve-form select {
            padding: 3px 6px;
            font-size: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="header">
    <h1>조별과제 관리</h1>
    <div class="header-right">
        <span th:text="${user.name} + ' (' + ${user.role.name()} + ')'"></span>
        <a th:href="@{/logout}">로그아웃</a>
    </div>
</div>

<div class="layout">
    <nav class="sidebar">
        <ul class="sidebar-menu">
            <li><a th:href="@{/dashboard}" th:classappend="${currentPage == 'dashboard'} ? 'active'">대시보드</a></li>
            <li th:if="${user.leader}"><a th:href="@{/users/new}" th:classappend="${currentPage == 'user-add'} ? 'active'">사용자추가</a></li>
            <li><a th:href="@{/approval-history}" th:classappend="${currentPage == 'approval-history'} ? 'active'">결재함</a></li>
        </ul>
    </nav>

    <div class="main-content">
        <div class="section-header">
            <h2>결재함</h2>
        </div>

        <div class="filter-tabs">
            <a th:href="@{/approval-history}" th:classappend="${currentStatus == null} ? 'active'">전체</a>
            <a th:href="@{/approval-history(status='PENDING')}" th:classappend="${currentStatus == 'PENDING'} ? 'active'">승인대기</a>
            <a th:href="@{/approval-history(status='APPROVED')}" th:classappend="${currentStatus == 'APPROVED'} ? 'active'">승인</a>
            <a th:href="@{/approval-history(status='REJECTED')}" th:classappend="${currentStatus == 'REJECTED'} ? 'active'">반려</a>
        </div>

        <table th:if="${!assignments.isEmpty()}">
            <thead>
            <tr>
                <th>제목</th>
                <th>등록자</th>
                <th>담당자</th>
                <th>착수일</th>
                <th>마감일</th>
                <th>결재상태</th>
                <th>반려사유</th>
                <th th:if="${user.leader and currentStatus == 'PENDING'}">액션</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="assignment : ${assignments}">
                <td th:text="${assignment.title}"></td>
                <td th:text="${assignment.createdBy != null ? assignment.createdBy.name : '-'}"></td>
                <td th:text="${assignment.user != null ? assignment.user.name : '미할당'}"></td>
                <td th:text="${assignment.startDate}"></td>
                <td th:text="${assignment.dueDate}"></td>
                <td>
                    <span class="status-badge"
                          th:classappend="'approval-' + ${assignment.approvalStatus.name()}"
                          th:text="${assignment.approvalStatus.name()}"></span>
                </td>
                <td>
                    <span th:if="${assignment.rejectionReason != null}" th:text="${assignment.rejectionReason}"></span>
                    <span th:if="${assignment.rejectionReason == null}">-</span>
                </td>
                <td th:if="${user.leader and currentStatus == 'PENDING'}">
                    <form th:action="@{/assignments/{id}/approve(id=${assignment.id})}" method="post" class="approve-form">
                        <select name="assigneeUserId" required>
                            <option value="">담당자</option>
                            <option th:each="member : ${members}" th:value="${member.id}" th:text="${member.name}"></option>
                        </select>
                        <button type="submit" class="btn btn-success">승인</button>
                    </form>
                    <button type="button" class="btn btn-warning"
                            th:onclick="'rejectAssignment(' + ${assignment.id} + ')'">반려</button>
                </td>
            </tr>
            </tbody>
        </table>

        <div th:if="${assignments.isEmpty()}" class="empty-message">
            결재 이력이 없습니다.
        </div>
    </div>
</div>

<script th:if="${user.leader and currentStatus == 'PENDING'}">
function rejectAssignment(id) {
    var reason = prompt('반려 사유를 입력하세요:');
    if (reason !== null && reason.trim() !== '') {
        var form = document.createElement('form');
        form.method = 'post';
        form.action = '/assignments/' + id + '/reject';
        var input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'rejectionReason';
        input.value = reason;
        form.appendChild(input);
        document.body.appendChild(form);
        form.submit();
    }
}
</script>
</body>
</html>
