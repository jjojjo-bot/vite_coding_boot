<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대시보드</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }

        .header {
            background: #fff;
            padding: 16px 32px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 20px;
            color: #1a1a1a;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-right span {
            color: #555;
            font-size: 14px;
        }

        .header-right a {
            color: #e74c3c;
            text-decoration: none;
            font-size: 14px;
        }

        .header-right a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 1100px;
            margin: 32px auto;
            padding: 0 16px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-header h2 {
            font-size: 18px;
            color: #1a1a1a;
        }

        .btn {
            display: inline-block;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
        }

        .btn-primary {
            background: #4a90d9;
        }

        .btn-primary:hover {
            background: #357abd;
        }

        .btn-danger {
            background: #e74c3c;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-success {
            background: #27ae60;
        }

        .btn-success:hover {
            background: #219a52;
        }

        .btn-warning {
            background: #f39c12;
        }

        .btn-warning:hover {
            background: #d68910;
        }

        .btn-info {
            background: #3498db;
        }

        .btn-info:hover {
            background: #2980b9;
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        }

        th, td {
            padding: 12px 16px;
            text-align: left;
        }

        th {
            background: #f8f9fa;
            color: #555;
            font-size: 13px;
            font-weight: 600;
            border-bottom: 2px solid #e9ecef;
        }

        td {
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
            color: #333;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-NOT_STARTED {
            background: #e9ecef;
            color: #555;
        }

        .status-IN_PROGRESS {
            background: #d4edfc;
            color: #2980b9;
        }

        .status-DELAYED {
            background: #fde8e8;
            color: #e74c3c;
        }

        .status-COMPLETED {
            background: #d5f5e3;
            color: #27ae60;
        }

        .status-DELAYED_COMPLETED {
            background: #fef3cd;
            color: #d68910;
        }

        .approval-PENDING {
            background: #fff3cd;
            color: #856404;
        }

        .approval-APPROVED {
            background: #d5f5e3;
            color: #27ae60;
        }

        .approval-REJECTED {
            background: #fde8e8;
            color: #e74c3c;
        }

        .rejection-reason {
            font-size: 12px;
            color: #e74c3c;
            margin-top: 4px;
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 15px;
        }

        .members-section {
            margin-top: 32px;
        }

        .approve-form {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .approve-form select {
            padding: 3px 6px;
            font-size: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="header">
    <h1>조별과제 관리</h1>
    <div class="header-right">
        <span th:text="${user.name} + ' (' + ${user.role.name()} + ')'"></span>
        <a th:href="@{/logout}">로그아웃</a>
    </div>
</div>

<div class="container">
    <div class="section-header">
        <h2>과제 목록</h2>
        <a th:href="@{/assignments/new}" class="btn btn-primary">과제 생성</a>
    </div>

    <table th:if="${!assignments.isEmpty()}">
        <thead>
        <tr>
            <th>제목</th>
            <th>등록자</th>
            <th>담당자</th>
            <th>착수일</th>
            <th>마감일</th>
            <th>결재상태</th>
            <th>진행상태</th>
            <th>액션</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="assignment : ${assignments}">
            <td th:text="${assignment.title}"></td>
            <td th:text="${assignment.createdBy != null ? assignment.createdBy.name : '-'}"></td>
            <td th:text="${assignment.user != null ? assignment.user.name : '미할당'}"></td>
            <td th:text="${assignment.startDate}"></td>
            <td th:text="${assignment.dueDate}"></td>
            <td>
                <span class="status-badge"
                      th:classappend="'approval-' + ${assignment.approvalStatus.name()}"
                      th:text="${assignment.approvalStatus.name()}"></span>
                <div th:if="${assignment.rejectionReason != null}" class="rejection-reason"
                     th:text="'사유: ' + ${assignment.rejectionReason}"></div>
            </td>
            <td>
                <span th:if="${assignment.calculateProgressStatus() != null}"
                      class="status-badge"
                      th:classappend="'status-' + ${assignment.calculateProgressStatus().name()}"
                      th:text="${assignment.calculateProgressStatus().name()}"></span>
                <span th:if="${assignment.calculateProgressStatus() == null}">-</span>
            </td>
            <td>
                <!-- 조장: 승인 (PENDING 상태일 때) - 담당자 선택 포함 -->
                <form th:if="${user.leader and assignment.approvalStatus.name() == 'PENDING'}"
                      th:action="@{/assignments/{id}/approve(id=${assignment.id})}" method="post" class="approve-form">
                    <select name="assigneeUserId" required>
                        <option value="">담당자</option>
                        <option th:each="member : ${members}" th:value="${member.id}" th:text="${member.name}"></option>
                    </select>
                    <button type="submit" class="btn btn-success btn-sm">승인</button>
                </form>
                <!-- 조장: 반려 버튼 (PENDING 상태일 때) -->
                <button th:if="${user.leader and assignment.approvalStatus.name() == 'PENDING'}"
                        type="button" class="btn btn-warning btn-sm"
                        th:onclick="'rejectAssignment(' + ${assignment.id} + ')'">반려</button>
                <!-- 조장: 삭제 버튼 -->
                <form th:if="${user.leader}" th:action="@{/assignments/{id}/delete(id=${assignment.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('삭제하시겠습니까?');">삭제</button>
                </form>
                <!-- 수정 버튼 (모든 사용자) -->
                <a th:href="@{/assignments/{id}/edit(id=${assignment.id})}" class="btn btn-info btn-sm">수정</a>
                <!-- 최종결과 입력 버튼 (담당자 본인 + APPROVED + finalResult 없을 때) -->
                <a th:if="${assignment.user != null and assignment.user.id == user.id and assignment.approvalStatus.name() == 'APPROVED' and assignment.finalResult == null}"
                   th:href="@{/assignments/{id}/result(id=${assignment.id})}" class="btn btn-success btn-sm">최종결과 입력</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${assignments.isEmpty()}" class="empty-message">
        등록된 과제가 없습니다.
    </div>

    <!-- 조장: 조원 목록 -->
    <div th:if="${user.leader}" class="members-section">
        <h2 style="margin-bottom: 16px;">조원 목록</h2>
        <table>
            <thead>
            <tr>
                <th>이름</th>
                <th>아이디</th>
                <th>역할</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="member : ${members}">
                <td th:text="${member.name}"></td>
                <td th:text="${member.username}"></td>
                <td th:text="${member.role.name()}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
function rejectAssignment(id) {
    var reason = prompt('반려 사유를 입력하세요:');
    if (reason !== null && reason.trim() !== '') {
        var form = document.createElement('form');
        form.method = 'post';
        form.action = '/assignments/' + id + '/reject';
        var input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'rejectionReason';
        input.value = reason;
        form.appendChild(input);
        document.body.appendChild(form);
        form.submit();
    }
}
</script>
</body>
</html>
